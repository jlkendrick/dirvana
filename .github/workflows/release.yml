name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            --title "Dirvana ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          SHA=$(curl -sL "https://github.com/jlkendrick/dirvana/archive/refs/tags/${VERSION}.tar.gz" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jlkendrick/homebrew-tap.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/dirvana.rb << FORMULA
          class Dirvana < Formula
            desc "Intelligent directory navigation and command augmentation tool for Zsh"
            homepage "https://github.com/jlkendrick/dirvana"
            url "https://github.com/jlkendrick/dirvana/archive/refs/tags/${VERSION}.tar.gz"
            sha256 "${SHA}"
            license "MIT"

            depends_on "cmake" => :build
            depends_on :macos

            def install
              system "cmake", "-S", ".", "-B", "build",
                     "-DCMAKE_BUILD_TYPE=Release",
                     "-DDIRVANA_VERSION=\#{version}",
                     *std_cmake_args
              system "cmake", "--build", "build", "--target", "dv-binary"
              bin.install "build/dv-binary"
              zsh_completion.install "docs/scripts/_dv"
              etc.install "docs/scripts/dirvana.zsh"
            end

            def post_install
              # Add source line to ~/.zshrc if not already present
              zshrc = File.expand_path("~/.zshrc")
              source_line = "source \\"#{etc}/dirvana.zsh\\""
              if File.exist?(zshrc)
                unless File.read(zshrc).include?("dirvana.zsh")
                  File.open(zshrc, "a") { |f| f.puts "\\n# Dirvana\\n#{source_line}" }
                end
              else
                File.write(zshrc, "# Dirvana\\n#{source_line}\\n")
              end

              # Initialize the database from the user's home directory
              system "#{bin}/dv-binary", "--enter", "dv", "build", "--root", ENV["HOME"]
            end

            def caveats
              <<~EOS
                Dirvana has been configured automatically. Reload your shell to activate it:

                  source ~/.zshrc

                To rebuild the database from a different root:

                  dv build --root ~/Code
              EOS
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/dv-binary --version")
            end
          end
          FORMULA

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/dirvana.rb
          git diff --staged --quiet && echo "Formula already up to date" && exit 0
          git commit -m "dirvana ${VERSION}"
          git push
